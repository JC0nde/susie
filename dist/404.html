}pre{padding:1rem;overflow-x:auto;}.post-comments-cta{padding-top:1.2rem;}.comment-buttons{display:flex;gap:1rem;flex-wrap:wrap;}.comment-separator{margin-top:0.8rem;}.btn-comment{display:inline-block;padding:0.6rem 1.2rem;border:1px solid var(--accent-color);color:var(--accent-color);font-family:monospace;font-size:0.9rem;text-decoration:none;transition:background 0.15s ease,color 0.15s ease;}.btn-comment:hover{background:var(--accent-color);color:var(--bg-color);text-decoration:none;}.btn-comment.btn-social{border-color:var(--muted-color);color:var(--muted-color);}.btn-comment.btn-social:hover{background:var(--muted-color);color:var(--bg-color);}</style><script>document.addEventListener('DOMContentLoaded', function() { const modal=document.getElementById('search-modal');const trigger=document.getElementById('search-trigger');const input=document.getElementById('search-input');const results=document.getElementById('search-results');let searchIndex=null;let activeIndex=-1;if(trigger && modal){async function openSearch(){modal.style.display='block';input.focus();if(!searchIndex){const response=await fetch('/search-index.json');searchIndex=await response.json();}}function closeSearch(){modal.style.display='none';input.value='';results.innerHTML='';activeIndex=-1;}trigger.addEventListener('click',openSearch);window.addEventListener('keydown',(e)=>{if((e.ctrlKey || e.metaKey)&& e.key==='k'){e.preventDefault();modal.style.display==='none' ? openSearch():closeSearch();}if(e.key==='/' && document.activeElement.tagName !=='INPUT' && document.activeElement.tagName !=='TEXTAREA'){e.preventDefault();if(modal.style.display==='none' || !modal.style.display){openSearch();}}if(e.key==='Escape')closeSearch();});modal.addEventListener('click',(e)=>{if(e.target===modal)closeSearch();});function updateSelection(links){links.forEach((link,index)=>{const li=link.parentElement;if(index===activeIndex){li.style.backgroundColor='rgba(0,255,204,0.15)';li.style.paddingLeft='5px';li.style.borderRadius='3px';link.style.color='#fff';}else{li.style.backgroundColor='';li.style.paddingLeft='0px';link.style.color='#00ffcc';}});}input.addEventListener('keydown',(e)=>{const links=results.querySelectorAll('a');if(links.length===0)return;if(e.key==='Enter'){e.preventDefault();if(links.length===1){links[0].click();}else if(activeIndex >=0){links[activeIndex].click();}return;}if(e.key==='ArrowDown'){e.preventDefault();activeIndex++;if(activeIndex >=links.length)activeIndex=0;updateSelection(links);}if(e.key==='ArrowUp'){e.preventDefault();activeIndex--;if(activeIndex< 0)activeIndex=links.length-1;updateSelection(links);}});input.addEventListener('input',(e)=>{const query=e.target.value.toLowerCase().trim();results.innerHTML='';activeIndex=-1;if(query.length< 2 || !searchIndex)return;const matches=searchIndex.filter(item=>item.title.toLowerCase().includes(query)|| item.content.includes(query)|| item.description.toLowerCase().includes(query));matches.forEach(item=>{const li=document.createElement('li');li.style.margin='10px 0';li.style.transition='all 0.1s ease';li.innerHTML=`<a href="${item.slug}" style="color:#00ffcc;text-decoration:none;display:inline-block;width:100%;"><strong>${item.title}</strong></a><br><small style="color:#aaa;">${item.description}</small>`;results.appendChild(li);});if(matches.length===0){results.innerHTML='<li style="color:#888;">Aucun résultat trouvé.</li>';}});} });</script></head><body><header class="site-header"><div class="header-container" style="display: flex; justify-content: space-between; align-items: center;"><a href="/" class="logo" style="text-decoration: none;">&lt;conde&gt;</a><div class="header-right" style="display: flex; align-items: center; gap: 20px;"><button id="search-trigger" style="background: none; border: none; color: var(--muted-color); font-family: monospace; padding: 0; cursor: pointer; font-size: 18px;"><span style="color: var(--accent-color);">/</span>rechercher</button><nav class="main-nav"><ul style="list-sty
